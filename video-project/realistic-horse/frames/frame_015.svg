<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- 身体渐变 -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    
    <!-- 肌肉高光渐变 -->
    <radialGradient id="muscleHighlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D2691E;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:0" />
    </radialGradient>
    
    <!-- 鬃毛渐变 -->
    <linearGradient id="maneGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A2511;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F1B0C;stop-opacity:1" />
    </linearGradient>
    
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGradient)" opacity="1"/>
  
  <!-- 地面阴影 -->
  <ellipse cx="960" cy="850" rx="400" ry="40" fill="#000000" opacity="0">
    <animate attributeName="opacity" from="0" to="0.2" dur="2s" begin="15s" fill="freeze"/>
  </ellipse>
  
  <!-- 标题 -->
  <text x="960" y="60" font-family="Arial, Microsoft YaHei" font-size="36" font-weight="bold" fill="#2F4F4F" text-anchor="middle">🎨 绘画过程：写实骏马</text>
  
  <!-- 进度条 -->
  <rect x="460" y="80" width="1000" height="16" fill="#E0E0E0" rx="8"/>
  <rect x="460" y="80" width="160" height="16" fill="#4CAF50" rx="8"/>
  <text x="960" y="94" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">16%</text>
  
  <!-- 步骤提示 -->
  <text x="960" y="120" font-family="Arial, Microsoft YaHei" font-size="20" fill="#E24A4A" text-anchor="middle" font-weight="bold">步骤 2: 填充身体底色</text>
  
  <!-- 骏马绘制区域 (居中缩放) -->
  <g transform="translate(360, 180) scale(1.1)">
    <!-- 身体轮廓 -->
    <path d="M 280 420 
             Q 250 400 240 350 
             Q 230 280 280 240 
             Q 320 210 400 200 
             Q 500 190 580 200 
             Q 650 210 680 230 
             Q 700 240 700 260 
             Q 700 300 680 350 
             Q 660 400 640 420 
             Q 620 450 600 550 
             Q 590 600 580 620 
             Q 570 640 550 640 
             Q 530 640 520 620 
             Q 510 600 500 550 
             Q 490 500 480 480 
             Q 470 470 450 470 
             Q 430 470 420 480 
             Q 410 500 400 550 
             Q 390 600 380 620 
             Q 370 640 350 640 
             Q 330 640 320 620 
             Q 310 600 300 550 
             Q 290 480 280 420 Z" 
          fill="none" stroke="#8B4513" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>
    <!-- 身体主体 -->
    <path d="M 280 420 
             Q 250 400 240 350 
             Q 230 280 280 240 
             Q 320 210 400 200 
             Q 500 190 580 200 
             Q 650 210 680 230 
             Q 700 240 700 260 
             Q 700 300 680 350 
             Q 660 400 640 420 
             Q 620 450 600 550 
             Q 590 600 580 620 
             Q 570 640 550 640 
             Q 530 640 520 620 
             Q 510 600 500 550 
             Q 490 500 480 480 
             Q 470 470 450 470 
             Q 430 470 420 480 
             Q 410 500 400 550 
             Q 390 600 380 620 
             Q 370 640 350 640 
             Q 330 640 320 620 
             Q 310 600 300 550 
             Q 290 480 280 420 Z" 
          fill="url(#bodyGradient)" stroke="#654321" stroke-width="2"/>
    
    <!-- 肌肉高光 -->
    <ellipse cx="420" cy="320" rx="80" ry="50" fill="url(#muscleHighlight)" opacity="0.4"/>
    <ellipse cx="520" cy="300" rx="60" ry="40" fill="url(#muscleHighlight)" opacity="0.3"/>
  </g>
  
  <!-- 画笔图标 -->
  <g transform="translate(1720, 960)">
    <rect x="0" y="0" width="140" height="90" fill="#FFF8DC" stroke="#8B4513" stroke-width="3" rx="12"/>
    <text x="70" y="60" font-family="Arial" font-size="50" text-anchor="middle">🖌️</text>
  </g>
  
  <!-- 参考图提示 -->
  <text x="100" y="1050" font-family="Arial" font-size="14" fill="#999">参考：写实棕色骏马照片</text>
</svg>
